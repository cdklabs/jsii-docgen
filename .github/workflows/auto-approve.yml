name: Secure Action Workflow

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Enter your GitHub username"
        required: true

jobs:
  secure-job:
    runs-on: ubuntu-latest

    steps:
      - name: Check Authorization
        id: auth
        run: |
          if [ "${{ github.event.inputs.username }}" = "${{ github.repository_owner }}" ]; then
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "authorized=false" >> $GITHUB_OUTPUT
          fi

      - name: Unauthorized Access
        if: steps.auth.outputs.authorized == 'false'
        run: |
          echo "❌ Unauthorized user"
          exit 1

      - name: Authorized - Run Protected Script
        if: steps.auth.outputs.authorized == 'true'
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: |
          echo "✅ Authorized user"
          
          # Secret ka safe use (print nahi karna)
          curl -H "Authorization: Bearer $MY_SECRET" https://api.example.com/deploy
   
